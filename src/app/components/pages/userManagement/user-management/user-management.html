<div class="overlay" *ngIf="openNewUser">
  <div class="popup">
    <h2>Create New User</h2>

      <div class="user-data">
        <label>User Name</label>
        <input type="text" [(ngModel)]="NewUser.userName">
      </div>
      <div class="user-data">
        <label>Email</label>
        <input type="email" [(ngModel)]="NewUser.email">
      </div>
      <div class="user-data">
        <label>Password</label>
        <input type="password" [(ngModel)]="NewUser.password">
      </div>
      <div class="user-data">
        <label>Contact Number</label>
        <input type="text" [(ngModel)]="NewUser.contactNumber">
      </div>
      <div class="user-data">
        <label>Role</label>
        <select [(ngModel)]="NewUser.role">
          <option *ngFor="let r of roles" [ngValue]="r.id">
            {{ r.roleName }}
          </option>
        </select>
      </div>
    </div>
    <div class="user-button">
      <button class="btn create" (click)="createUser()">Create</button>
      <button class="btn cancel" (click)="closeCreateUserPopup()">Cancel</button>
    </div>
  </div>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>User Name</th>
        <th>Contact No</th>
        <th>Email Id</th>
        <th>Role</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of filteredUsers">
        <td>{{ user.userName | uppercase}}</td>
        <td>{{ user.contactNumber }}</td>
        <td>{{ user.email | lowercase}}</td>
        <td>{{ user.roleName }} ({{ user.roleId }})</td>

          <img src="assets/pencil.png" alt="Edit" (click)="openUpdateUserPopup(user)" class="action-icon edit" />
          <img src="assets/trash.png" alt="Delete" class="action-icon delete" (click)="openDeleteUserPopup(user)" />
        </td>
      </tr>
    </tbody>
  </table>
</div>
