


<form>
  
  <div class="container">

    <div class="main">
      <img src="assets/login.svg" alt="this is a login image" />
    </div>


    <div class="three">
      <h3 class="four">PURPLEIQ</h3>
      <p>Welcome To Asset Tracking</p>
      <h3>LOGIN</h3>

      <input
        class="two"
        type="text"
        [(ngModel)]="users.email"
        placeholder="Username"
        name="email"
        required
      /><br />

      <input
        type="password" [(ngModel)]="users.password" name="password"  placeholder="Password"
      /><br />

      <button type="submit" (click)="requestOtp()">Login</button>
      <div class="bg-half"></div>
    </div>
  </div>
</form>
