<div class="one">
  <p class="events">Events</p>
</div>

<div class="tab-header">
  <div class="tab" [class.active]="activeTab === 'events'" (click)="switchTab('events')">
    Events
  </div>

  <div class="tab" [class.active]="activeTab === 'alerts'" (click)="switchTab('alerts')">
    Alerts
  </div>
</div>

<div *ngIf="activeTab==='events'" class="table-container">
  <table>
    <thead>
      <tr>
        <th>DESCRIPTION</th>
        <th>Time Stamp</th>
        <th>Time Raised</th>
        <th>Source</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of eventsList">
        <td>{{ row.description }}</td>
        <td>{{ row.timestamp | date:'yyyy-MM-dd HH:mm:ss' }}</td>
        <td>{{row.timestamp | date:'yyyy-MM-dd HH:mm:ss' }}</td>
        <td>PurpleIQ-Application</td>
      </tr>


      <tr class="pagination-row" style="height: 50px;">
        <td colspan="6">
          <div class="pagination-container">
            <label>
              Items per page:
              <select [(ngModel)]="pageSize" (change)="onPageSizeChange(pageSize)" style="margin-left: 5px;">
                <option *ngFor="let size of pageSizes" [value]="size">{{ size }}</option>
              </select>
            </label>
            <span class="range-info">{{ currentPage }} of {{ totalPages }}</span>
            <div>
              <button (click)="loadEvents(currentPage - 1)" [disabled]="currentPage === 1" class="arrow-btn">⏴</button>
              <button (click)="loadEvents(currentPage + 1)" [disabled]="currentPage === totalPages"
                class="arrow-btn">⏵</button>
            </div>
          </div>
        </td>
      </tr>




    </tbody>
  </table>
</div>
