<nav class="navbar">
  <img class="menu-icon" data-tooltip="Menu" data-tooltip="Menu" src="assets/menu.png" alt="Menu"
    (click)="toggleSidebar()">
  <div class="navbar-title">Asset Tracking</div>

  <div class="navbar-right">
    <span class="username">{{ userid }}</span>

    <div class="user-dropdown-container" (click)="toggleDropdown($event)">
      <img src="assets/user.png" alt="User Icon" class="navbar-logo1" />
      <div class="user-dropdown" *ngIf="menuOpen">
        <a (click)="changePassword()">Change Password</a>
        <a (click)="logout()">Logout</a>
      </div>
    </div>
  </div>
  <img src="assets/PurpleIQ.png" alt="Logo" class="navbar-logo" />
</nav>

<div class="layout">

  <div class="sidebar" [class.collapsed]="isSidebarCollapsed">
    <nav>

      <a *ngIf="canViewDashboard" class="main tooltip" routerLink="/dashboard" [class.active]="isDashboardActive()"
        (click)="closeAllSubmenus()" data-tooltip="Dashboard">
        <img src="assets/dashboard.png" alt="Dashboard icon" class="white-icon">
        <span class="link-text">Dashboard</span>
      </a>


      <div *ngIf="canViewTracking" class="menu-item" [class.open]="isTrackingMenuOpen"
        [class.active]="isTrackingMenuOpen || isTrackingActive()">
        <a href="javascript:void(0)" (click)="toggleTrackingMenu ()">
          <span class="admintooltip" data-tooltip="Tracking">
            <img src="assets/markers.png" alt="Tracking" class="white-icon">
            <span class="link-text">Tracking</span>
          </span>
        </a>
        <div class="submenu">
          <a href="#">
            <span class="tooltip" data-tooltip="Tracking">
              <img src="assets/markers.png" alt="Tracking icon" class="purple-icon">
            </span>
            Tracking
          </a>
          <div class="submenu-item" [class.open]="isLiveOpen">
            <a class="one-sub" routerLink="/live" routerLinkActive="active" (click)="closeAllSubmenus()">Live</a>
          </div>
          <div class="submenu-item" [class.open]="isHistoricalsOpen">
            <a class="one-sub" routerLink="/historicals" routerLinkActive="active"
              (click)="closeAllSubmenus()">Historicals</a>
          </div>
        </div>
      </div>


      <a *ngIf="canViewEvents" class="main tooltip" routerLink="/events" routerLinkActive="active"
        (click)="closeAllSubmenus()" data-tooltip="Events">
        <img src="assets/event.png" alt="Events" class="white-icon">
        <span class="link-text">Events</span>
      </a>

      <a *ngIf="canViewReports" class="main tooltip" routerLink="/createreport" [class.active]="isReportsActive()"
        (click)="closeAllSubmenus()" data-tooltip="Reports">
        <img src="assets/reports.png" alt="Reports" class="white-icon">
        <span class="link-text">Reports</span>
      </a>

      <a *ngIf="canViewProcessAutomation" class="main tooltip" routerLink="/processautomation"
        [class.active]="isProcessActive()" (click)="closeAllSubmenus()" data-tooltip="Process & Automation">
        <img src="assets/automation.png" alt="Automation" class="white-icon">
        <span class="link-text">Process & Automation</span>
      </a>

      <div *ngIf="canViewAdministration" class="menu-item" [class.open]="isAdminMenuOpen"
        [class.active]="isAdminMenuOpen || isAdminActive()">
        <a href="javascript:void(0)" (click)="toggleAdminMenu()">
          <span class="admintooltip" data-tooltip="Admin">
            <img src="assets/administration.png" alt="Admin" class="white-icon">
            <span class="link-text">Administration</span>
          </span>
        </a>
        <div class="submenu">
          <a href="#">
            <span class="tooltip" data-tooltip="Administration">
              <img src="assets/administration.png" alt="Dashboard icon">
            </span>
            Administration
          </a>
          <a class="one-sub" routerLink="/project" routerLinkActive="active"
            (click)="closeAllSubmenus()">Configuration</a>
          <!-- <a class="one-sub" routerLink="/licensemanagement" routerLinkActive="active" (click)="closeAllSubmenus()">License Management</a> -->
          <a class="one-sub" routerLink="/user-management" routerLinkActive="active" (click)="closeAllSubmenus()">User
            Management</a>
        </div>
      </div>
    </nav>
  </div>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
